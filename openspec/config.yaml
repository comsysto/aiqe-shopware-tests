schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
     Tech stack: 
          - **Selenide 7.6.0** fluent Selenium wrapper; use `$()`, `shouldBe()`, `shouldHave()` for assertions on elements
          - **Serenity BDD 4.2.8** wraps JUnit to produce HTML reports; apply `@SerenityTest` when adding reporting steps
          - **JUnit 5** test runner (`useJUnitPlatform()` in build)
          - **AssertJ** fluent assertions for non-element checks
     We use conventional commits
     Domain: e-commerce platform
     
     - When facing any non-trivial architectural or framework decision, write an ADR (Architecture Decision Record).
     - When documenting architecture that can be visualize, create a C4 diagram.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
rules:
     tasks:
       - When starting implementation of a proposal, create a branch from master that is named according to gitflow and includes
       - a reference to the prpoposal.
       - When working on any task make sure to create/check out a branch from the proposal branch that is named according to gitflow and includes the task number.
       - Before finishing a task, run all available regression tests and make sure they pass.
       - When finishing any task, create a PR to master and ask the user to review it. Don't merge before the user has approved the changes.
